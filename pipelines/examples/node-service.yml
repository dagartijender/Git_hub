trigger:
  branches:
    include:
      - main

resources:
  repositories:
    - repository: centralTemplates
      type: git
      name: PlatformEngineering/central-pipeline-templates
      ref: refs/tags/v1.0.0

variables:
  - group: enterprise-cicd-secrets
  - name: imageTag
    value: $(Build.BuildId)

stages:
  - template: pipelines/templates/stages/build.yml@centralTemplates
    parameters:
      serviceName: orders-api
      language: node
      runtimeVersion: "22.x"
      workingDirectory: .
      vmImage: ubuntu-latest
      sonarProjectKey: orders-api
      enableSonarQube: true
      enableSecretScan: true
      buildSteps:
        - bash: |
            npm ci
            npm run lint
            npm test -- --coverage
            npm run build
          displayName: Test and build Node.js service

  - template: pipelines/templates/stages/publish.yml@centralTemplates
    parameters:
      serviceName: orders-api
      vmImage: ubuntu-latest
      artifactPath: dist
      artifactName: drop

  - template: pipelines/templates/stages/security.yml@centralTemplates
    parameters:
      serviceName: orders-api
      vmImage: ubuntu-latest
      workingDirectory: .
      artifactName: drop
      veracodeApplicationProfile: Orders API
      enableBlackDuck: true
      enableVeracode: true

  - template: pipelines/templates/stages/container.yml@centralTemplates
    parameters:
      serviceName: orders-api
      vmImage: ubuntu-latest
      dockerfile: Dockerfile
      dockerBuildContext: .
      imageRepository: orders-api
      imageTag: $(Build.BuildId)
      enabled: true

  - template: pipelines/templates/stages/gitops.yml@centralTemplates
    parameters:
      serviceName: orders-api
      vmImage: ubuntu-latest
      imageTag: $(Build.BuildId)
      gitopsBranch: main
      gitopsValuesFile: apps/orders-api/environments/dev/values.yaml
      enabled: true
