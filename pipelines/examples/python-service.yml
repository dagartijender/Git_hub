trigger:
  branches:
    include:
      - main

resources:
  repositories:
    - repository: centralTemplates
      type: git
      name: PlatformEngineering/central-pipeline-templates
      ref: refs/tags/v1.0.0

variables:
  - group: enterprise-cicd-secrets
  - name: imageTag
    value: $(Build.BuildId)

stages:
  - template: pipelines/templates/stages/build.yml@centralTemplates
    parameters:
      serviceName: payments-api
      language: python
      runtimeVersion: "3.12"
      workingDirectory: .
      vmImage: ubuntu-latest
      sonarProjectKey: payments-api
      enableSonarQube: true
      enableSecretScan: true
      buildSteps:
        - bash: |
            pip install -r requirements.txt
            pytest --junitxml=test-results.xml --cov=src --cov-report=xml
          displayName: Test Python service

  - template: pipelines/templates/stages/publish.yml@centralTemplates
    parameters:
      serviceName: payments-api
      vmImage: ubuntu-latest
      artifactPath: src
      artifactName: drop

  - template: pipelines/templates/stages/security.yml@centralTemplates
    parameters:
      serviceName: payments-api
      vmImage: ubuntu-latest
      workingDirectory: .
      artifactName: drop
      veracodeApplicationProfile: Payments API
      enableBlackDuck: true
      enableVeracode: true

  - template: pipelines/templates/stages/container.yml@centralTemplates
    parameters:
      serviceName: payments-api
      vmImage: ubuntu-latest
      dockerfile: Dockerfile
      dockerBuildContext: .
      imageRepository: payments-api
      imageTag: $(Build.BuildId)
      enabled: true

  - template: pipelines/templates/stages/gitops.yml@centralTemplates
    parameters:
      serviceName: payments-api
      vmImage: ubuntu-latest
      imageTag: $(Build.BuildId)
      gitopsBranch: main
      gitopsValuesFile: apps/payments-api/environments/dev/values.yaml
      enabled: true
