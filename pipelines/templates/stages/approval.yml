parameters:
  - name: stageName
    type: string
    default: ManualApproval
  - name: displayName
    type: string
    default: Manual approval
  - name: dependsOn
    type: object
    default: []
  - name: instructions
    type: string
    default: Review the published artifacts and approve this run to continue.
  - name: notifyUsers
    type: string
    default: ""
  - name: approvers
    type: string
    default: ""
  - name: timeoutInMinutes
    type: number
    default: 1440
  - name: enabled
    type: boolean
    default: true

stages:
  - stage: ${{ parameters.stageName }}
    displayName: ${{ parameters.displayName }}
    dependsOn: ${{ parameters.dependsOn }}
    condition: and(succeeded(), ${{ parameters.enabled }}, eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: WaitForApproval
        displayName: Wait for manual approval
        pool: server
        timeoutInMinutes: ${{ parameters.timeoutInMinutes }}
        steps:
          - task: ManualValidation@1
            displayName: Manual approval
            timeoutInMinutes: ${{ parameters.timeoutInMinutes }}
            inputs:
              notifyUsers: ${{ parameters.notifyUsers }}
              approvers: ${{ parameters.approvers }}
              allowApproversToApproveTheirOwnRuns: false
              instructions: ${{ parameters.instructions }}
              onTimeout: reject
