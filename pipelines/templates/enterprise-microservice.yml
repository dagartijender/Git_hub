parameters:
  - name: serviceName
    type: string
  - name: language
    type: string
    values:
      - python
      - node
      - java
      - dotnet
  - name: runtimeVersion
    type: string
  - name: workingDirectory
    type: string
    default: .
  - name: vmImage
    type: string
    default: ubuntu-latest
  - name: artifactPath
    type: string
  - name: artifactName
    type: string
    default: drop
  - name: dockerfile
    type: string
  - name: dockerBuildContext
    type: string
    default: .
  - name: imageRepository
    type: string
  - name: imageTag
    type: string
    default: $(Build.BuildId)
  - name: sonarProjectKey
    type: string
  - name: veracodeApplicationProfile
    type: string
  - name: gitopsBranch
    type: string
    default: main
  - name: gitopsValuesFile
    type: string
  - name: buildSteps
    type: stepList
    default: []
  - name: preBuildSteps
    type: stepList
    default: []
  - name: postBuildSteps
    type: stepList
    default: []
  - name: enable
    type: object
    default:
      sonarQube: true
      secretScan: true
      blackDuck: true
      veracode: true
      container: true
      gitOps: true

variables:
  - group: enterprise-cicd-secrets
  - name: serviceName
    value: ${{ parameters.serviceName }}
  - name: imageTag
    value: ${{ parameters.imageTag }}

stages:
  - template: stages/build.yml
    parameters:
      serviceName: ${{ parameters.serviceName }}
      language: ${{ parameters.language }}
      runtimeVersion: ${{ parameters.runtimeVersion }}
      workingDirectory: ${{ parameters.workingDirectory }}
      vmImage: ${{ parameters.vmImage }}
      artifactPath: ${{ parameters.artifactPath }}
      artifactName: ${{ parameters.artifactName }}
      sonarProjectKey: ${{ parameters.sonarProjectKey }}
      enableSonarQube: ${{ parameters.enable.sonarQube }}
      enableSecretScan: ${{ parameters.enable.secretScan }}
      preBuildSteps: ${{ parameters.preBuildSteps }}
      buildSteps: ${{ parameters.buildSteps }}
      postBuildSteps: ${{ parameters.postBuildSteps }}

  - template: stages/security.yml
    parameters:
      serviceName: ${{ parameters.serviceName }}
      vmImage: ${{ parameters.vmImage }}
      workingDirectory: ${{ parameters.workingDirectory }}
      artifactName: ${{ parameters.artifactName }}
      veracodeApplicationProfile: ${{ parameters.veracodeApplicationProfile }}
      enableBlackDuck: ${{ parameters.enable.blackDuck }}
      enableVeracode: ${{ parameters.enable.veracode }}

  - template: stages/container.yml
    parameters:
      serviceName: ${{ parameters.serviceName }}
      vmImage: ${{ parameters.vmImage }}
      dockerfile: ${{ parameters.dockerfile }}
      dockerBuildContext: ${{ parameters.dockerBuildContext }}
      imageRepository: ${{ parameters.imageRepository }}
      imageTag: ${{ parameters.imageTag }}
      enabled: ${{ parameters.enable.container }}

  - template: stages/gitops.yml
    parameters:
      serviceName: ${{ parameters.serviceName }}
      vmImage: ${{ parameters.vmImage }}
      imageTag: ${{ parameters.imageTag }}
      gitopsBranch: ${{ parameters.gitopsBranch }}
      gitopsValuesFile: ${{ parameters.gitopsValuesFile }}
      enabled: ${{ parameters.enable.gitOps }}
